<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Twin Health System</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --primary:       #0d6efd;
      --primary-light: #3d8bfd;
      --primary-glow:  rgba(13, 110, 253, 0.25);
      --danger:        #dc3545;
      --danger-light:  #f1416c;
      --danger-glow:   rgba(220, 53, 69, 0.22);
      --success:       #198754;
      --success-light: #0eb87a;
      --success-glow:  rgba(25, 135, 84, 0.22);
      --warning:       #fd7e14;
      --surface:       rgba(255,255,255,0.07);
      --surface-solid: #ffffff;
      --surface-hover: rgba(255,255,255,0.12);
      --border:        rgba(255,255,255,0.13);
      --text-main:     #f0f4ff;
      --text-muted:    rgba(200,215,255,0.65);
      --shadow-card:   0 8px 32px rgba(0,0,20,0.28);
      --shadow-glow:   0 0 40px var(--primary-glow);
      --radius:        18px;
      --radius-sm:     10px;
      --font-display:  'Syne', sans-serif;
      --font-body:     'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(13,110,253,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(25,135,84,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(220,53,69,0.08) 0%, transparent 70%),
        linear-gradient(160deg, #050d1a 0%, #07142b 45%, #04110d 100%);
      background-attachment: fixed;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Grid lines ────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(13,110,253,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13,110,253,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .navbar-dts {
      position: sticky; top: 0; z-index: 1000;
      padding: 0 2rem;
      height: 68px;
      display: flex; align-items: center;
      background: rgba(5, 13, 30, 0.75);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    .navbar-dts .brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px var(--primary-glow);
      flex-shrink: 0;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-main);
      line-height: 1.2;
    }
    .brand-subtitle {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex; align-items: center; gap: 4px;
      margin-left: auto;
    }

    .nav-link-dts {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
      position: relative;
    }

    .nav-link-dts:hover,
    .nav-link-dts.active {
      color: var(--text-main);
      background: var(--surface-hover);
    }

    .nav-link-dts.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(13,110,253,0.35), rgba(124,58,237,0.2));
      box-shadow: 0 0 0 1px rgba(13,110,253,0.35);
    }

    .nav-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success-light);
      box-shadow: 0 0 8px var(--success-light);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Main wrapper ──────────────────────────────────────── */
    .page-wrapper {
      position: relative; z-index: 1;
      min-height: calc(100vh - 68px - 80px);
      padding: 2.5rem 1rem 3rem;
    }

    .dashboard-container {
      max-width: 1180px;
      margin: 0 auto;
    }

    /* ── Page header ───────────────────────────────────────── */
    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-header .badge-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(13,110,253,0.15);
      color: var(--primary-light);
      border: 1px solid rgba(13,110,253,0.3);
      margin-bottom: 0.75rem;
    }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(120deg, #ffffff 30%, #93c5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 0.5rem;
      max-width: 520px;
    }

    /* ── Glass card ────────────────────────────────────────── */
    .glass-card {
      background: rgba(255,255,255,0.055);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card), var(--shadow-glow);
    }

    /* ── Stat card ─────────────────────────────────────────── */
    .stat-card {
      padding: 1.75rem;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 110px; height: 110px;
      border-radius: 50%;
      opacity: 0.08;
    }

    .stat-card.danger::before  { background: var(--danger);  }
    .stat-card.success::before { background: var(--success); }
    .stat-card.primary::before { background: var(--primary); }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 1rem;
    }

    .stat-icon.danger  { background: rgba(220,53,69,0.2);   color: var(--danger-light); }
    .stat-icon.success { background: rgba(25,135,84,0.2);   color: var(--success-light);}
    .stat-icon.primary { background: rgba(13,110,253,0.2);  color: var(--primary-light);}
    .stat-icon.warning { background: rgba(253,126,20,0.2);  color: var(--warning);      }

    .stat-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }

    .stat-value.danger  { color: #f87171; }
    .stat-value.success { color: #4ade80; }

    .stat-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    /* ── Divider with label ────────────────────────────────── */
    .section-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 2rem 0 1.25rem;
    }
    .section-divider .label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .section-divider .line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-dts {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .btn-dts::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-dts:hover::before { opacity: 1; }

    .btn-dts-primary {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff;
      box-shadow: 0 6px 24px rgba(13,110,253,0.45);
    }
    .btn-dts-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(13,110,253,0.55);
    }

    .btn-dts-success {
      background: linear-gradient(135deg, var(--success), #0891b2);
      color: #fff;
      box-shadow: 0 6px 24px rgba(25,135,84,0.4);
    }
    .btn-dts-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(25,135,84,0.5);
    }

    .btn-spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Code textarea ─────────────────────────────────────── */
    .code-area {
      width: 100%;
      background: rgba(0,5,20,0.6);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: #93c5fd;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.65;
      padding: 1.25rem;
      resize: vertical;
      min-height: 180px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .code-area:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* ── Alerts ────────────────────────────────────────────── */
    .alert-dts {
      padding: 1rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-dts.danger  { background: rgba(220,53,69,0.15);  border: 1px solid rgba(220,53,69,0.3);  color: #fca5a5; }
    .alert-dts.success { background: rgba(25,135,84,0.15);  border: 1px solid rgba(25,135,84,0.3);  color: #86efac; }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 20px 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    footer span { color: var(--primary-light); font-weight: 500; }

    /* ── Progress ring ─────────────────────────────────────── */
    .ring-wrap {
      position: relative;
      display: inline-flex;
      align-items: center; justify-content: center;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-label {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }

    .ring-label .val {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .ring-label .sub {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Comparison bar ────────────────────────────────────── */
    .compare-bar-wrap { margin-bottom: 1rem; }

    .compare-bar-label {
      display: flex; justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 500;
    }

    .compare-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      overflow: hidden;
    }

    .compare-bar-fill {
      height: 100%;
      border-radius: 50px;
      transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .navbar-dts { padding: 0 1rem; }
      .brand-title { font-size: 1rem; }
      .page-header h1 { font-size: 1.6rem; }
      .stat-value { font-size: 1.9rem; }
      .page-wrapper { padding: 1.5rem 0.75rem 2rem; }
    }

    /* ── Fade-in animation ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar-dts">
    <a href="/" class="brand">
      <div class="brand-icon">
        <i class="fa-solid fa-heart-pulse" style="color:#fff;"></i>
      </div>
      <div>
        <div class="brand-title">Digital Twin Health</div>
        <div class="brand-subtitle">AI Clinical System</div>
      </div>
    </a>

    <div class="nav-links">
      <div class="nav-pulse me-2"></div>
      <a href="/predict"    class="nav-link-dts {% block nav_predict %}{% endblock %}">
        <i class="fa-solid fa-stethoscope"></i> Predict
      </a>
      <a href="/simulation" class="nav-link-dts {% block nav_simulation %}{% endblock %}">
        <i class="fa-solid fa-flask-vial"></i> Simulation
      </a>
    </div>
  </nav>

  <!-- ── Page content ───────────────────────────────────── -->
  <main class="page-wrapper">
    {% block content %}{% endblock %}

   
  </main>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer>
    &copy; 2024 &nbsp;<span>Digital Twin Health System</span> &nbsp;·&nbsp;
    AI-Powered Cardiac Risk Engine &nbsp;·&nbsp;
    <i class="fa-solid fa-shield-heart" style="color: #f87171;"></i> Clinical Grade
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
